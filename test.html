<!DOCTYPE html>
<html>
<head>
  <title>Test</title>
</head>
<body>

  <textarea id="html" rows="18" style="width:100%">
<html>
<head>
<style>
body{
    margin:0;
    padding:40px;
    background:#1e1e1e;
}

.tarjeta{
    width:700px;
    height:700px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    font-family:Arial;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.tarjeta img{
    width:100%;
    height:400px;
    object-fit:cover;
}

.contenido{
    padding:30px;
}

h1{
    margin:0;
    font-size:42px;
}

p{
    color:#555;
    font-size:20px;
}
</style>
</head>

<body>

<div class="tarjeta">

    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop" />

    <div class="contenido">
        <h1>Prueba de tarjeta</h1>

        <p>
            Esta imagen viene desde internet y debería aparecer
            correctamente en el PNG descargado.
        </p>
    </div>

</div>

</body>
</html>
  </textarea>

  <br><br>

  <button onclick="descargar()">
    Descargar imagen
  </button>

  <script>
    async function descargar() {

      const html = document.getElementById("html").value;

      const formData = new FormData();

      formData.append("html", html);
      formData.append("selector", ".tarjeta");

      const res = await fetch(
        "http://localhost:8000/html-to-image/selector",
        {
          method: "POST",
          body: formData,
        }
      );

      if (!res.ok) {
        alert(await res.text());
        return;
      }

      const blob = await res.blob();

      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");

      a.href = url;
      a.download = "tarjeta.png";

      document.body.appendChild(a);

      a.click();

      a.remove();

      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
